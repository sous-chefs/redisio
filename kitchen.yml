---
driver:
  name: dokken
  privileged: true
  chef_image: chef/chef
  chef_version: current

provisioner:
  name: dokken
  policyfile_path: Policyfile.rb
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  chef_license: accept-no-persist
  multiple_converge: 2
  enforce_idempotency: true
  deprecations_as_errors: true

verifier:
  name: inspec

transport:
  name: dokken

platforms:
  - name: amazonlinux-2023
    driver:
      image: dokken/amazonlinux-2023
      pid_one_command: /usr/lib/systemd/systemd
  - name: debian-12
    driver:
      image: dokken/debian-12
      pid_one_command: /bin/systemd
  - name: debian-13
    driver:
      image: dokken/debian-13
      pid_one_command: /usr/lib/systemd/systemd
  - name: rockylinux-9
    driver:
      image: dokken/rockylinux-9
      pid_one_command: /usr/lib/systemd/systemd
  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd
  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  sentinel: &sentinel_run_list
    - recipe[test::sentinel]
  multisentinel: &multisentinel_run_list
    - recipe[test::multisentinel]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  sentinel: &sentinel_verifier
    inspec_tests:
      - path: test/integration/sentinel
  multisentinel: &multisentinel_verifier
    inspec_tests:
      - path: test/integration/multisentinel

suites:
  - name: default
    named_run_list: default
    verifier: *default_verifier
  - name: sentinel
    named_run_list: sentinel
    verifier: *sentinel_verifier
  - name: multisentinel
    named_run_list: multisentinel
    verifier: *multisentinel_verifier
